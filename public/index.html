<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Service</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#0a0a0a;
  color:#fff;
  font-family:'Inter',sans-serif;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}

.wrap{
  max-width:560px;
  margin:0 auto;
  height:100%;
  display:flex;
  flex-direction:column;
}

/* NAV */
.nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 24px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.logo{
  font-size:12px;font-weight:700;
  letter-spacing:4px;color:#fff;
  text-transform:uppercase;
}
.logo em{color:rgba(255,255,255,0.3);font-style:normal;}
.phone-btn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.7);
  padding:8px 18px;border-radius:8px;
  font-size:11px;font-weight:500;cursor:pointer;
  font-family:'Inter',sans-serif;
  letter-spacing:0.3px;
  transition:all 0.2s;
}
.phone-btn:hover{
  background:rgba(255,255,255,0.06);
  border-color:rgba(255,255,255,0.3);
  color:#fff;
}

/* HERO */
.hero{
  padding:24px 24px 16px;
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

.city-line{
  font-size:10px;font-weight:500;
  letter-spacing:3px;color:rgba(255,255,255,0.35);
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}

.headline{
  font-size:clamp(36px,9vw,62px);font-weight:800;
  line-height:1.05;color:#fff;
  margin-bottom:10px;
  letter-spacing:-2.5px;
}
.headline em{font-style:normal;color:rgba(255,255,255,0.45);}

.sub{
  font-size:12px;color:rgba(255,255,255,0.3);
  font-weight:400;letter-spacing:0.3px;
  margin-bottom:14px;
}
.sub span{margin:0 8px;opacity:0.4;}

.divider{
  height:1px;
  background:rgba(255,255,255,0.06);
  margin-bottom:12px;
}

/* QUIZ */
.quiz{
  background:#111;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.07);
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}
.quiz-top{
  padding:14px 18px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  background:#141414;
  flex-shrink:0;
}
.avatar{
  width:34px;height:34px;border-radius:10px;
  background:#1e1e1e;
  border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.quiz-name{font-size:13px;font-weight:600;color:#fff;}
.quiz-status{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:#22c55e;margin-left:auto;flex-shrink:0;
  box-shadow:0 0 8px rgba(34,197,94,0.6);
}

.chat{
  padding:18px;
  flex:1;
  min-height:0;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
  background:#0d0d0d;
}
.msg{
  max-width:84%;padding:11px 15px;
  font-size:13px;line-height:1.65;
  white-space:pre-line;font-weight:400;
}
.bot{
  background:#1a1a1a;
  color:rgba(255,255,255,0.85);
  align-self:flex-start;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:2px 12px 12px 12px;
}
.user{
  background:#1f1f1f;
  color:#fff;
  align-self:flex-end;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px 2px 12px 12px;
  font-weight:500;
}

.qbtns{
  display:flex;flex-wrap:wrap;gap:7px;
  padding:14px 18px;
  border-top:1px solid rgba(255,255,255,0.05);
  background:#111;
  flex-shrink:0;
}
.qbtn{
  background:#191919;
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.7);
  padding:12px 20px;border-radius:8px;
  font-size:14px;font-weight:500;cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:all 0.15s;
}
.qbtn:hover{
  background:#222;
  border-color:rgba(255,255,255,0.22);
  color:#fff;
}
.saved-hint{
  width:100%;
  text-align:left;
  border-color:rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.9);
  padding:10px 14px;
  font-size:11px;
  line-height:1.5;
}

.inp-row{
  display:flex;gap:8px;padding:12px 14px;
  border-top:1px solid rgba(255,255,255,0.05);
  background:#111;
  flex-shrink:0;
}
.cinp{
  flex:1;background:#181818;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;
  padding:10px 14px;font-size:16px;
  color:#fff;outline:none;
  font-family:'Inter',sans-serif;
  transition:border-color 0.2s;
}
.cinp::placeholder{color:rgba(255,255,255,0.2);}
.cinp:focus{border-color:rgba(255,255,255,0.2);}
.cinp.phone-mode{
  font-size:24px;font-weight:500;
  letter-spacing:1.5px;
  padding:10px 14px;
}
.mbtn{
  background:#1a1a1a;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;width:40px;height:40px;
  flex-shrink:0;cursor:pointer;
  font-size:17px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.mbtn:hover{background:#222;border-color:rgba(255,255,255,0.2);}
.mbtn.recording{
  background:rgba(239,68,68,0.12);
  border-color:rgba(239,68,68,0.5);
  animation:mic-pulse 1.2s ease-in-out infinite;
}
.sbtn{
  background:#fff;border:none;
  border-radius:8px;width:40px;height:40px;
  flex-shrink:0;cursor:pointer;
  color:#000;font-size:18px;font-weight:700;
  transition:opacity 0.2s;
}
.sbtn:hover{opacity:0.85;}

.footer{
  text-align:center;padding:16px 24px;
  font-size:10px;letter-spacing:1px;
  color:rgba(255,255,255,0.15);
  border-top:1px solid rgba(255,255,255,0.04);
}

/* TYPING */
.typing{display:flex;gap:4px;align-items:center;}
.typing span{
  width:4px;height:4px;
  background:rgba(255,255,255,0.35);
  border-radius:50%;
  animation:bl 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
@keyframes mic-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.35);}
  50%{box-shadow:0 0 0 7px rgba(239,68,68,0);}
}

/* MOBILE */
@media(max-width:430px){
  .nav{padding:14px 16px;}
  .logo{font-size:11px;letter-spacing:3px;}
  .phone-btn{padding:7px 14px;font-size:10px;}

  .hero{padding:16px 16px 12px;}
  .city-line{font-size:9px;letter-spacing:2px;margin-bottom:8px;}
  .headline{letter-spacing:-1.5px;margin-bottom:8px;}
  .sub{font-size:11px;margin-bottom:10px;}
  .sub span{margin:0 6px;}
  .divider{margin-bottom:10px;}

  .quiz{border-radius:12px;}
  .quiz-top{padding:12px 14px;}
  .avatar{width:30px;height:30px;font-size:14px;border-radius:8px;}
  .quiz-name{font-size:12px;}
  .chat{padding:14px;gap:8px;}
  .msg{max-width:92%;font-size:12px;padding:9px 12px;}
  .qbtns{padding:11px 14px;gap:6px;}
  .qbtn{font-size:13px;padding:10px 16px;}
  .inp-row{padding:10px 12px;gap:6px;}
  .cinp{font-size:16px;padding:9px 12px;}
  .mbtn{width:36px;height:36px;font-size:15px;}
  .sbtn{width:36px;height:36px;font-size:16px;}
}

@media(max-width:360px){
  .headline{letter-spacing:-1px;}
  .phone-btn{display:none;}
}
</style>
</head>
<body>
<div class="wrap">

<nav class="nav">
  <div class="logo">Line <em>·</em> Service</div>
  <button class="phone-btn">Зателефонувати</button>
</nav>

<div class="hero">
  <div class="city-line" id="city-line">Київ · Цілодобово</div>
  <h1 class="headline">Сантехнік,<br>який приїде<br><em>за 30 хвилин.</em></h1>
  <p class="sub">Аварійний виїзд <span>·</span> Встановлення <span>·</span> Ремонт</p>
  <div class="divider"></div>

  <div class="quiz">
    <div class="quiz-top">
      <div class="avatar">🔧</div>
      <div>
        <div class="quiz-name">Line Service · AI-консультант</div>
        <div class="quiz-status">Відповідає миттєво</div>
      </div>
      <div class="dot"></div>
    </div>

    <div class="chat" id="chat">
      <div class="msg bot">Привіт 👋 Розкажіть що сталось — я зорієнтую по ціні та часу виїзду.</div>
    </div>

    <div class="qbtns" id="qb">
      <button class="qbtn" onclick="q('🚿 Засор труби')">🚿 Засор</button>
      <button class="qbtn" onclick="q('💧 Течія крана')">💧 Течія</button>
      <button class="qbtn" onclick="q('🚨 Аварія')">🚨 Аварія</button>
      <button class="qbtn" onclick="q('🔩 Встановлення')">🔩 Встановлення</button>
      <button class="qbtn" onclick="qRepair()">🔧 Ремонт</button>
    </div>

    <div class="inp-row">
      <input class="cinp" id="inp" placeholder="Або опишіть проблему..." onkeydown="if(event.key==='Enter')send()" />
      <button class="mbtn" id="mbtn" onclick="toggleVoice()">🎤</button>
      <button class="sbtn" onclick="send()">→</button>
    </div>
  </div>
</div>

<div class="footer">Line Service © 2024 · Київ · Одеса</div>
</div>

<script>
const chat = document.getElementById('chat');
const inp  = document.getElementById('inp');
const qb   = document.getElementById('qb');

let step = 0;
let currentCity = 'Київ';
const lead = { problem: '', urgency: '', district: '', name: '', phone: '' };
let phoneInputHandler = null;
let recognition = null;
let isRecording = false;
const hasSpeech = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;

let savedContact = null;
try {
  const _raw = localStorage.getItem('ls_contact');
  if (_raw) {
    const _p = JSON.parse(_raw);
    if (_p.name && _p.phone) savedContact = _p;
  }
} catch (e) {}

function formatPhone(raw) {
  let d = raw.replace(/\D/g, '');
  if (d.length === 0) return '+38';
  if (d.length <= 2 && '380'.startsWith(d)) return '+' + d;
  if (!d.startsWith('380')) {
    if (d.startsWith('80'))       d = '3' + d;
    else if (d.startsWith('0'))   d = '38' + d;
    else if (!d.startsWith('38')) d = '38' + d;
  }
  d = d.slice(0, 12);
  let out = '+' + d.slice(0, 3);
  if (d.length > 3)  out += ' ' + d.slice(3, 5);
  if (d.length > 5)  out += ' ' + d.slice(5, 8);
  if (d.length > 8)  out += ' ' + d.slice(8, 10);
  if (d.length > 10) out += ' ' + d.slice(10, 12);
  return out;
}

function toggleVoice() {
  if (isRecording) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { inp.placeholder = 'Голос не підтримується цим браузером'; return; }
  recognition = new SR();
  recognition.lang = 'uk-UA';
  recognition.continuous = false;
  recognition.interimResults = true;
  const mbtn = document.getElementById('mbtn');
  recognition.onstart  = () => { isRecording = true;  mbtn.classList.add('recording'); };
  recognition.onresult = (e) => {
    let t = '';
    for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
    inp.value = t;
  };
  recognition.onend    = () => { isRecording = false; mbtn.classList.remove('recording'); recognition = null; };
  recognition.onerror  = (e) => { isRecording = false; mbtn.classList.remove('recording'); recognition = null; console.warn('[voice]', e.error); };
  recognition.start();
}

function enterPhoneMode() {
  inp.setAttribute('inputmode', 'tel');
  inp.classList.add('phone-mode');
  inp.value = '+38';
  document.getElementById('mbtn').style.display = 'none';
  phoneInputHandler = () => {
    const f = formatPhone(inp.value);
    if (inp.value !== f) inp.value = f;
  };
  inp.addEventListener('input', phoneInputHandler);
  qb.innerHTML = '';
  if (navigator.contacts && typeof navigator.contacts.select === 'function') {
    const b = document.createElement('button');
    b.className = 'qbtn'; b.textContent = '📱 Поділитися контактом';
    b.onclick = async () => {
      try {
        const [c] = await navigator.contacts.select(['tel'], { multiple: false });
        if (c?.tel?.length) inp.value = formatPhone(c.tel[0]);
      } catch (e) {}
    };
    qb.appendChild(b);
  }
}

function exitPhoneMode() {
  inp.removeAttribute('inputmode');
  inp.classList.remove('phone-mode');
  if (phoneInputHandler) {
    inp.removeEventListener('input', phoneInputHandler);
    phoneInputHandler = null;
  }
  document.getElementById('mbtn').style.display = '';
}

function addMsg(t, u) {
  const d = document.createElement('div');
  d.className = 'msg ' + (u ? 'user' : 'bot');
  d.textContent = t;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typ';
  d.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}

function rmTyp() { const t = document.getElementById('typ'); if (t) t.remove(); }

function setQ(items, field, ns) {
  qb.innerHTML = '';
  items.forEach(t => {
    const b = document.createElement('button');
    b.className = 'qbtn'; b.textContent = t;
    b.onclick = () => {
      qb.innerHTML = '';
      addMsg(t, true);
      if (field) lead[field] = t;
      step = ns;
      botReply();
    };
    qb.appendChild(b);
  });
}

const kyivDistricts   = ['Шевченківський','Печерський','Подільський','Оболонський','Дарницький','Деснянський','Дніпровський','Голосіївський','Святошинський','Солом\'янський'];
const odesaDistricts  = ['Приморський','Київський','Малиновський','Суворовський','Хаджибейський','Центр'];

function getDistricts() {
  return currentCity === 'Одеса' ? odesaDistricts : kyivDistricts;
}

async function submitLead() {
  try {
    const res = await fetch('/api/lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...lead, city: currentCity }),
    });
    return (await res.json()).ok;
  } catch (e) {
    console.error('[lead submit]', e);
    return false;
  }
}

function botReply() {
  showTyping();
  setTimeout(async () => {
    rmTyp();
    if (step === 2) {
      addMsg('В якому районі ви знаходитесь?', false);
      setQ(getDistricts(), 'district', 3);
    } else if (step === 5) {
      addMsg('⏳ Шукаю найближчого спеціаліста у вашому районі...', false);
      qb.innerHTML = '';
      await submitLead();
      try { localStorage.setItem('ls_contact', JSON.stringify({ name: lead.name, phone: lead.phone })); } catch (e) {}
      setTimeout(() => {
        showTyping();
        setTimeout(() => {
          rmTyp();
          addMsg('✅ Знайдено! Передаю вашу заявку найближчому майстру.\nВін зателефонує вам найближчим часом.\nОрієнтовна вартість: 500–900 грн.', false);
        }, 2000);
      }, 500);
    } else {
      const msgs = {
        1: 'Наскільки термінова ситуація?',
        3: 'Як вас звати?',
        4: 'Ваш номер телефону? 📞',
      };
      addMsg(msgs[step] || '', false);
      if (step === 1) setQ(['🚨 Терміново — зараз', '🕐 Сьогодні', '📅 Можна завтра'], 'urgency', 2);
      else if (step === 4) enterPhoneMode();
      else if (step === 3 && savedContact) {
        qb.innerHTML = '';
        const hint = document.createElement('button');
        hint.className = 'qbtn saved-hint';
        hint.textContent = `👤 Використати збережені дані?\n${savedContact.name} · ${savedContact.phone}`;
        hint.onclick = () => {
          qb.innerHTML = '';
          addMsg(savedContact.name, true);
          addMsg(savedContact.phone, true);
          lead.name = savedContact.name;
          lead.phone = savedContact.phone;
          step = 5;
          botReply();
        };
        qb.appendChild(hint);
      }
      else qb.innerHTML = '';
    }
  }, 900);
}

function q(t) {
  qb.innerHTML = '';
  addMsg(t, true);
  lead.problem = t;
  step = 1;
  botReply();
}

function qRepair() {
  qb.innerHTML = '';
  addMsg('🔧 Ремонт', true);
  showTyping();
  setTimeout(() => {
    rmTyp();
    addMsg('Що саме потрібно відремонтувати?', false);
    qb.innerHTML = '';
    ['🚿 Кран', '🚽 Зливний бачок', '🚿 Душ', '🔧 Інше'].forEach(t => {
      const b = document.createElement('button');
      b.className = 'qbtn'; b.textContent = t;
      b.onclick = () => {
        qb.innerHTML = '';
        addMsg(t, true);
        lead.problem = '🔧 Ремонт — ' + t;
        step = 1;
        botReply();
      };
      qb.appendChild(b);
    });
  }, 900);
}

function send() {
  const t = inp.value.trim(); if (!t) return;
  if (step === 4) {
    if (t.replace(/\D/g, '').length < 10) {
      inp.style.borderColor = 'rgba(255,80,80,0.5)';
      setTimeout(() => inp.style.borderColor = '', 1200);
      return;
    }
    exitPhoneMode();
  }
  inp.value = '';
  if (step === 0) { q(t); return; }
  addMsg(t, true);
  if (step === 3) lead.name = t;
  if (step === 4) lead.phone = t;
  step++;
  if (step > 5) return;
  botReply();
}

fetch('https://ipapi.co/json/')
  .then(r => r.json())
  .then(d => {
    const c = (d.city || '').toLowerCase();
    if (c.includes('odesa') || c.includes('одес')) {
      document.getElementById('city-line').textContent = 'Одеса · Цілодобово';
      currentCity = 'Одеса';
    }
  }).catch(() => {});
</script>
</body>
</html>
